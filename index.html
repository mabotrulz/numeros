<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Joga com Neo — Números</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; min-height: 100dvh;
    overflow: hidden; touch-action: none; user-select: none;
  }

  .game {
    width: 100vw; height: 100vh; height: 100dvh;
    max-width: 800px;
    background: linear-gradient(180deg, #1a1a2e, #16213e, #0f3460);
    display: flex; flex-direction: column;
    position: relative; overflow: hidden;
  }

  .header {
    text-align: center; padding: 6px 12px 2px;
    flex-shrink: 0; z-index: 2; position: relative;
  }
  .header h1 {
    color: #f1c40f; font-size: clamp(13px, 3vw, 18px);
    font-weight: 900; letter-spacing: 2px;
  }
  .header .hint {
    color: #888; font-size: clamp(9px, 2vw, 12px);
    min-height: 16px;
  }

  /* Arena - transparent bg */
  .arena {
    flex-shrink: 0;
    height: clamp(220px, 48vw, 340px);
    position: relative;
    margin: 0 4px;
    z-index: 2;
  }

  .arena-side {
    position: absolute;
    bottom: 0;
    display: flex; flex-direction: column; align-items: center;
    z-index: 3;
  }
  .arena-side.left { left: 5%; }
  .arena-side.right { right: 5%; }

  .arena-side .char-img {
    object-fit: contain;
    image-rendering: auto;
    transition: all 0.3s;
  }
  .arena-side .poke-img {
    width: clamp(140px, 32vw, 240px);
    height: clamp(140px, 32vw, 240px);
  }
  .arena-side .rocket-img {
    width: clamp(110px, 26vw, 190px);
    height: clamp(110px, 26vw, 190px);
  }
  .arena-side .char-label {
    font-size: clamp(8px, 1.6vw, 11px);
    color: #aaa;
    font-weight: 600;
    letter-spacing: 1px;
    margin-top: 2px;
  }

  .arena-side .team-rocket-col {
    display: flex; flex-direction: column;
    align-items: center; gap: 2px;
  }
  .arena-side .team-rocket-col .rocket-row {
    display: flex; gap: 0px; align-items: flex-end;
  }
  .arena-side .team-rocket-col .rocket-row .rocket-img {
    margin-right: -8px;
  }
  .arena-side .team-rocket-col .rocket-row .rocket-img:last-child {
    margin-right: 0;
  }

  /* Attack animations per type */
  .arena-side.left .poke-img.attack-electric {
    animation: attackElectric 0.5s ease;
  }
  @keyframes attackElectric {
    0% { transform: translateX(0) scale(1); filter: brightness(1); }
    25% { transform: translateX(80px) scale(1.3); filter: brightness(2) hue-rotate(60deg); }
    50% { transform: translateX(-10px) scale(0.8); filter: brightness(1.5); }
    100% { transform: translateX(0) scale(1); filter: brightness(1); }
  }

  .arena-side.left .poke-img.attack-fire {
    animation: attackFire 0.5s ease;
  }
  @keyframes attackFire {
    0% { transform: translateX(0) scale(1); opacity: 1; }
    30% { transform: translateX(70px) scale(1.4); opacity: 0.7; filter: saturate(3) hue-rotate(-30deg); }
    60% { transform: translateX(-5px) scale(0.85); filter: saturate(1); }
    100% { transform: translateX(0) scale(1); opacity: 1; }
  }

  .arena-side.left .poke-img.attack-water {
    animation: attackWater 0.5s ease;
  }
  @keyframes attackWater {
    0% { transform: translateX(0) translateY(0); }
    30% { transform: translateX(60px) translateY(-10px) scale(1.2); }
    60% { transform: translateX(-8px) translateY(5px) scale(0.9); }
    100% { transform: translateX(0) translateY(0); }
  }

  .arena-side.left .poke-img.attack-psychic {
    animation: attackPsychic 0.5s ease;
  }
  @keyframes attackPsychic {
    0% { transform: translateX(0) scale(1) rotate(0); }
    25% { transform: translateX(50px) scale(1.3) rotate(-15deg); filter: hue-rotate(180deg); }
    50% { transform: translateX(-5px) scale(0.8) rotate(10deg); }
    100% { transform: translateX(0) scale(1) rotate(0); filter: none; }
  }

  .arena-side.left .poke-img.attack-ghost {
    animation: attackGhost 0.5s ease;
  }
  @keyframes attackGhost {
    0% { transform: translateX(0) scale(1); opacity: 1; }
    20% { opacity: 0.3; }
    40% { transform: translateX(65px) scale(1.3); opacity: 0.8; filter: saturate(0); }
    60% { opacity: 0.5; transform: translateX(-8px) scale(0.8); }
    100% { transform: translateX(0) scale(1); opacity: 1; filter: none; }
  }

  .arena-side.left .poke-img.attack-fairy {
    animation: attackFairy 0.5s ease;
  }
  @keyframes attackFairy {
    0% { transform: translateX(0) scale(1) rotate(0); }
    30% { transform: translateX(55px) scale(1.2) rotate(10deg); filter: hue-rotate(90deg) brightness(1.3); }
    60% { transform: translateX(-5px) scale(0.9) rotate(-5deg); }
    100% { transform: translateX(0) scale(1) rotate(0); filter: none; }
  }

  .arena-side.left .poke-img.attack-dragon {
    animation: attackDragon 0.5s ease;
  }
  @keyframes attackDragon {
    0% { transform: translateX(0) scale(1); }
    20% { transform: translateX(30px) scale(1.5); filter: hue-rotate(45deg) saturate(2); }
    50% { transform: translateX(85px) scale(1.1); filter: hue-rotate(90deg); }
    70% { transform: translateX(-12px) scale(0.8); }
    100% { transform: translateX(0) scale(1); filter: none; }
  }

  .arena-side.left .poke-img.attack-normal {
    animation: attackNormal 0.5s ease;
  }
  @keyframes attackNormal {
    0% { transform: translateX(0); }
    30% { transform: translateX(75px) scale(1.25); }
    60% { transform: translateX(-10px) scale(0.85); }
    100% { transform: translateX(0); }
  }

  .arena-side.right .rocket-img.hit {
    animation: hitShake 0.4s ease;
  }
  @keyframes hitShake {
    0%,100% { transform: translateX(0) rotate(0); }
    20% { transform: translateX(12px) rotate(-5deg); }
    40% { transform: translateX(-8px) rotate(5deg); }
    60% { transform: translateX(6px) rotate(-3deg); }
  }

  .arena-side.right .rocket-img.blast {
    animation: blastOff 1.2s ease forwards;
  }
  @keyframes blastOff {
    0% { transform: translateX(0) translateY(0) scale(1); opacity: 1; }
    20% { transform: translateX(0) translateY(0) scale(1.1); opacity: 1; }
    100% { transform: translateX(80px) translateY(-300px) scale(0.2) rotate(30deg); opacity: 0; }
  }

  .attack-effect {
    position: absolute;
    z-index: 5;
    pointer-events: none;
    font-size: clamp(35px, 9vw, 70px);
    animation: effectFly 0.6s ease forwards;
    top: 25%; left: 30%;
  }
  @keyframes effectFly {
    0% { transform: translateX(0) scale(0.3) rotate(0); opacity: 1; }
    50% { transform: translateX(40%) scale(1.1) rotate(20deg); opacity: 1; }
    100% { transform: translateX(80%) scale(1.3) rotate(-10deg); opacity: 0; }
  }

  /* Slots */
  .slots-area {
    flex: 2;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    padding: 2px 8px;
    min-height: 0; z-index: 2; position: relative;
  }
  .slots-row {
    display: flex; justify-content: center;
    gap: 8px; padding: 8px;
  }
  .slot {
    width: clamp(44px, 10vw, 68px);
    height: clamp(52px, 12vw, 76px);
    border: 3px dashed #f1c40f;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: clamp(28px, 7vw, 48px);
    font-weight: 700; color: #f1c40f;
    transition: all 0.25s;
    background: rgba(241,196,15,0.05);
  }
  .slot.filled {
    border-style: solid;
    background: rgba(241,196,15,0.15);
    animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .slot.wrong {
    border-color: #e74c3c;
    background: rgba(231,76,60,0.2);
    animation: shake 0.35s ease;
  }
  .slot.drag-over {
    border-color: #4ecca3;
    background: rgba(78,204,163,0.1);
    transform: scale(1.08);
  }

  @keyframes popIn { 0%{transform:scale(0.7)}100%{transform:scale(1)} }
  @keyframes shake { 0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)} }

  .num-pool {
    display: flex; flex-wrap: wrap;
    justify-content: center; gap: 5px;
    padding: 6px 10px;
    flex-shrink: 0; min-height: 44px; max-height: 150px;
    overflow-y: auto; z-index: 2; position: relative;
  }
  .num-tile {
    width: clamp(40px, 9vw, 58px);
    height: clamp(44px, 10vw, 62px);
    background: linear-gradient(135deg, #f1c40f, #f39c12);
    color: #1a1a2e;
    font-size: clamp(22px, 5vw, 36px);
    font-weight: 700; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    cursor: grab; touch-action: none;
    transition: transform 0.15s, opacity 0.3s;
    box-shadow: 0 3px 8px rgba(241,196,15,0.3);
    border-bottom: 3px solid #d4a017;
  }
  .num-tile:active { cursor: grabbing; }
  .num-tile:hover { transform: translateY(-2px); }
  .num-tile.dragging { opacity: 0.35; transform: scale(0.9); }
  .num-tile.placed { opacity: 0; pointer-events: none; transform: scale(0.4); }

  .feedback {
    text-align: center; padding: 2px 12px;
    min-height: 24px; flex-shrink: 0; z-index: 2; position: relative;
  }
  .feedback .msg { font-size: clamp(13px, 2.5vw, 18px); font-weight: 600; text-shadow: 1px 1px 2px rgba(0,0,0,0.3); }
  .feedback .msg.ok { color: #4ecca3; }
  .feedback .msg.fail { color: #e74c3c; }

  .stats-row {
    display: flex; justify-content: center; gap: 20px;
    padding: 2px 12px;
    flex-shrink: 0; z-index: 2; position: relative;
  }
  .stats-row .stat { text-align: center; }
  .stats-row .stat .val { font-size: clamp(16px, 3.5vw, 24px); font-weight: 700; color: #fff; }
  .stats-row .stat .label { font-size: clamp(8px, 1.6vw, 11px); color: #888; text-transform: uppercase; letter-spacing: 1px; }

  .win-overlay {
    position: absolute; inset: 0;
    background: rgba(15,52,96,0.93);
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    z-index: 100; opacity: 0; pointer-events: none;
    transition: opacity 0.5s; padding: 30px; text-align: center;
  }
  .win-overlay.active { opacity: 1; pointer-events: all; }
  .win-overlay h2 { font-size: clamp(28px,8vw,48px); color: #4ecca3; margin: 4px 0; }
  .win-overlay .sub { font-size: clamp(14px,3vw,18px); color: #aaa; margin-bottom: 8px; }
  .win-overlay button {
    padding: 12px 36px; font-size: clamp(14px,3vw,18px); font-weight: 700;
    background: #4ecca3; color: #1a1a2e; border: none; border-radius: 12px; cursor: pointer; letter-spacing: 1px; transition: transform 0.2s; margin-top: 8px;
  }
  .win-overlay button:hover { transform: scale(1.05); }

  /* Character intro animation */
  .intro-overlay {
    position: absolute; inset: 0;
    background: rgba(10,10,20,0.92);
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    z-index: 160;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  .intro-overlay.active { opacity: 1; pointer-events: all; }
  .intro-overlay .intro-char {
    width: clamp(160px, 40vw, 300px);
    height: clamp(160px, 40vw, 300px);
    object-fit: contain;
    transition: all 0.8s cubic-bezier(0.34, 1.2, 0.64, 1);
    animation: introEntrance 0.5s ease forwards;
  }
  @keyframes introEntrance {
    0% { transform: scale(0.3) rotate(-10deg); opacity: 0; }
    60% { transform: scale(1.1) rotate(3deg); opacity: 1; }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }
  .intro-overlay .intro-name {
    font-size: clamp(28px, 8vw, 56px);
    font-weight: 800;
    color: #f1c40f;
    margin-top: 8px;
    text-shadow: 0 0 30px rgba(241,196,15,0.3);
    animation: introNameIn 0.4s ease 0.3s forwards;
    opacity: 0;
  }
  @keyframes introNameIn {
    0% { transform: translateY(20px); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
  }
  .intro-overlay .intro-vs {
    font-size: clamp(20px, 5vw, 36px);
    color: #e74c3c;
    font-weight: 700;
    margin: 4px 0;
    animation: introNameIn 0.3s ease 0.1s forwards;
    opacity: 0;
  }

  /* Start screen */
  .start-overlay {
    position: absolute; inset: 0;
    background: rgba(15,52,96,0.95);
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    z-index: 150;
    padding: 30px; text-align: center;
    transition: opacity 0.5s;
  }
  .start-overlay.hidden { opacity: 0; pointer-events: none; }
  .start-overlay .logo { font-size: clamp(50px, 14vw, 90px); margin-bottom: 8px; }
  .start-overlay h2 { font-size: clamp(24px, 7vw, 40px); color: #f1c40f; margin-bottom: 4px; }
  .start-overlay p { font-size: clamp(13px, 3vw, 17px); color: #aaa; margin-bottom: 24px; }
  .start-overlay .start-btn {
    padding: 16px 48px; font-size: clamp(18px, 4vw, 24px); font-weight: 700;
    background: linear-gradient(135deg, #f1c40f, #f39c12);
    color: #1a1a2e; border: none; border-radius: 16px;
    cursor: pointer; letter-spacing: 2px;
    transition: transform 0.2s; box-shadow: 0 6px 25px rgba(241,196,15,0.3);
  }
  .start-overlay .start-btn:hover { transform: scale(1.08); }

  .drag-ghost {
    position: fixed; pointer-events: none; z-index: 200;
    width: clamp(40px,9vw,58px); height: clamp(44px,10vw,62px);
    background: linear-gradient(135deg,#f1c40f,#f39c12); color: #1a1a2e;
    font-size: clamp(22px,5vw,36px); font-weight: 700; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 25px rgba(0,0,0,0.3); transform: translate(-50%,-50%) scale(1.15);
    border-bottom: 3px solid #d4a017;
  }

  @media (max-width: 400px) {
    .slot { width: clamp(36px,12vw,48px); height: clamp(42px,14vw,54px); font-size: 22px; }
    .num-tile { width: clamp(34px,11vw,44px); height: clamp(38px,12vw,48px); font-size: 18px; }
    .arena-side .poke-img { width: clamp(100px,24vw,140px); height: clamp(100px,24vw,140px); }
    .arena-side .rocket-img { width: clamp(70px,18vw,110px); height: clamp(70px,18vw,110px); }
  }
</style>
</head>
<body>

<div class="game" id="game">
  <div class="header">
    <h1>⚡ Números ⚡</h1>
    <div class="hint" id="phraseHint">Onde está o número?</div>
  </div>

  <!-- Arena - transparent -->
  <div class="arena" id="arena">
    <div class="arena-side left" id="pokeSide">
      <img class="char-img poke-img" id="pokeImg" src="" alt="Pokémon">
      <div class="char-label" id="pokeName">Pikachu</div>
    </div>
    <div class="arena-side right" id="rocketSide">
      <div class="team-rocket-col">
        <div class="rocket-row" id="rocketRow">
          <img class="char-img rocket-img" id="rocketJessie" src="" alt="Jessie">
          <img class="char-img rocket-img" id="rocketJames" src="" alt="James">
          <img class="char-img rocket-img" id="rocketMeowth" src="" alt="Meowth">
        </div>
        <div class="char-label">Team Rocket</div>
      </div>
    </div>
  </div>

  <!-- Slots -->
  <div class="slots-area">
    <div class="slots-row" id="slotsContainer"></div>
  </div>

  <div class="num-pool" id="numPool"></div>

  <div class="feedback"><div class="msg" id="feedbackMsg"></div></div>

  <div class="stats-row">
    <div class="stat"><div class="val" id="scoreDisplay">0</div><div class="label">⭐</div></div>
    <div class="stat"><div class="val" id="phaseDisplay">0-9</div><div class="label">Fase</div></div>
    <div class="stat"><div class="val" id="roundDisplay">0/10</div><div class="label">Ronda</div></div>
  </div>

  <div class="win-overlay" id="winOverlay">
    <h2>🏆 Parabéns!</h2>
    <div class="sub">Completaste todos os números!</div>
    <button onclick="restartGame()">Jogar outra vez →</button>
  </div>

  <!-- Intro overlay -->
  <div class="intro-overlay" id="introOverlay">
    <img class="intro-char" id="introImage" src="" alt="">
    <div class="intro-name" id="introName"></div>
  </div>

  <!-- Start overlay -->
  <div class="start-overlay" id="startOverlay">
    <div class="logo">⚡</div>
    <h2>Números</h2>
    <p>Ajuda o Pokémon a derrotar a Team Rocket!</p>
    <button class="start-btn" onclick="startGame()">▶ COMEÇAR</button>
  </div>
</div>

<div class="drag-ghost" id="dragGhost" style="display:none"></div>
